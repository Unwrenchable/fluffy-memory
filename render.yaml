services:
  - type: web
    name: medhelper
    env: static
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:; worker-src 'self' blob: https:;"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
