services:
  - type: web
    name: medhelper
    env: static
    buildCommand: >
      node -e "
        const fs = require('fs');
        const xai = process.env.XAI_API_KEY || '';
        const hf  = process.env.HUGGINGFACE_API_KEY || '';
        fs.writeFileSync('js/env.js',
          '// Auto-generated from environment variables – do not commit.\n' +
          'window.MEDHELPER_XAI_KEY = \'' + xai.replace(/'/g, '') + '\';\n' +
          'window.MEDHELPER_HF_KEY  = \'' + hf.replace(/'/g, '')  + '\';\n'
        );
      "
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; connect-src 'self' https:; worker-src 'self' blob: https:;"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
